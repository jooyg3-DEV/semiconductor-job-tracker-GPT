filters:
  include_keywords:
    - "반도체"
    - "공정"
    - "process engineer"
    - "field application engineer"
    - "metrology"
    - "deposition"
    - "lithography"
    - "master"
    - "ph.d"
  exclude_keywords:
    - "software"
    - "ai"
    - "it"
  education_rule: "석사 이상"

runtime:
  timezone: "Asia/Seoul"
  miss_threshold: 3

