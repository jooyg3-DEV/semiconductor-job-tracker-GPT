name: job-tracker-debug-platform

on:
  workflow_dispatch:
    inputs:
      company:
        description: '회사명'
        required: true
        type: choice
        options:
          - 삼성전자DS
          - SK하이닉스
          - ASML
          - Applied Materials
          - KLA
          - Lam Research
          - TEL
          - Micron
          - ASM
          - TSMC
          - NVIDIA
          - AMD
      platform:
        description: '플랫폼명'
        required: true
        type: choice
        options:
          - 사람인
          - 잡코리아
          - 링커리어
          - 링크드인

jobs:
  debug-platform:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
      - env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python main.py --mode sync --run-platforms debug --debug-company '${{ inputs.company }}' --debug-platform '${{ inputs.platform }}'
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ inputs.company }}-${{ inputs.platform }}
          path: debug_outputs/*.csv
          if-no-files-found: warn
