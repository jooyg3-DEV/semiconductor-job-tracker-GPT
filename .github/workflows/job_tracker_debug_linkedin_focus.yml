name: job-tracker-debug-linkedin-focus

on:
  workflow_dispatch:

jobs:
  debug-linkedin-focus:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        company:
          - Applied Materials
          - KLA
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Prepare artifact directory
        run: mkdir -p debug_outputs

      - name: Run focused LinkedIn debug
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python main.py --mode sync --run-platforms debug --debug-company '${{ matrix.company }}' --debug-platform '링크드인'

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-linkedin-${{ matrix.company }}
          path: debug_outputs/*.csv
          if-no-files-found: ignore
