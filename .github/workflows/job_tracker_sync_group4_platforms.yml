name: job-tracker-sync-group4-platforms

on:
  workflow_dispatch:

jobs:
  sync-group4-platforms:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      ENABLE_PLATFORM_REGULAR_SYNC: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
      - env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python main.py --mode sync --run-platforms others
      - name: Upload CSV artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job_tracker_sync_group4_platforms-csv
          path: debug_outputs/*.csv
          if-no-files-found: ignore
