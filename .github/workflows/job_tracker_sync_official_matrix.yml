name: job-tracker-sync-official-matrix

on:
  schedule:
    - cron: '0 4 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  collect-official:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        company:
          - 삼성전자DS
          - SK하이닉스
          - ASML
          - Applied Materials
          - KLA
          - Lam Research
          - TEL
          - Micron
          - ASM
          - TSMC
          - NVIDIA
          - AMD
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      APPEND_ONLY_HISTORY: '1'
      SKIP_SHEET_WRITE: '1'
      SKIP_STATE_FLUSH: '1'
      SKIP_CLOSED_WRITE: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
      - env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python main.py --mode sync --run-platforms none --companies '${{ matrix.company }}'
      - name: Upload CSV artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: official-csv-${{ matrix.company }}
          path: debug_outputs/*.csv
          if-no-files-found: ignore

  append-official-to-sheets:
    needs: collect-official
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          pattern: official-csv-*
          path: collected_artifacts
          merge-multiple: false
      - env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python scripts/append_prewrite_csvs.py --root collected_artifacts
      - name: Upload aggregated CSV artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job_tracker_sync_official_matrix-csv
          path: collected_artifacts
          if-no-files-found: ignore
